version: "3.9"

services:
  # ─── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediguard_backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mediguard2026
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - neo4j
    restart: unless-stopped
    networks:
      - mediguard_net

  # ─── Next.js Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediguard_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mediguard_net

  # ─── Neo4j Knowledge Graph ────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: mediguard_neo4j
    environment:
      - NEO4J_AUTH=neo4j/mediguard2026
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    networks:
      - mediguard_net

networks:
  mediguard_net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
